<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="f-tray" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="f-badge" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <!-- Rainbow ring: each arc blends between its two adjacent badge colours -->
    <linearGradient id="grad-top"    x1="129" y1="129" x2="383" y2="129" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#34C759"/>
    </linearGradient>
    <linearGradient id="grad-right"  x1="383" y1="129" x2="383" y2="383" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#34C759"/>
      <stop offset="100%" stop-color="#AF52DE"/>
    </linearGradient>
    <linearGradient id="grad-bottom" x1="129" y1="383" x2="383" y2="383" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FF9500"/>
      <stop offset="100%" stop-color="#AF52DE"/>
    </linearGradient>
    <linearGradient id="grad-left"   x1="129" y1="129" x2="129" y2="383" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#FF9500"/>
    </linearGradient>

    <!-- Box front face: top slightly lighter, bottom darker -->
    <linearGradient id="box-face" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#252740"/>
      <stop offset="100%" stop-color="#171928"/>
    </linearGradient>

    <!-- Box front badge: diagonal rainbow matching the ring (TL→BR) -->
    <linearGradient id="grad-box-badge" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#007AFF"/>
      <stop offset="33%"  stop-color="#34C759"/>
      <stop offset="67%"  stop-color="#AF52DE"/>
      <stop offset="100%" stop-color="#FF9500"/>
    </linearGradient>
  </defs>

  <!-- ============================================================ -->
  <!-- 1. DISKETTE-HOLDER BOX                                       -->
  <!-- ============================================================ -->

  <!-- Box shadow + body                                              -->
  <!-- Shifted 24px up from before; taper reduced to 28px/side       -->
  <!-- TL(174,194) TR(338,194) BR(366,388) BL(146,388)               -->
  <!-- Rate: 28/194 = 0.1443 px per y per side                       -->
  <polygon points="174,194 338,194 366,388 146,388" fill="#10111E" filter="url(#f-tray)"/>
  <polygon points="174,194 338,194 366,388 146,388" fill="#1A1C30"/>

  <!-- Left wall (slightly lighter for 3D) -->
  <polygon points="174,194 186,194 158,388 146,388" fill="#1E2038"/>
  <!-- Right wall (slightly darker) -->
  <polygon points="326,194 338,194 366,388 354,388" fill="#101222"/>

  <!-- Box outer top rim face (visible from overhead angle) -->
  <!-- y=194: L=174 R=338   y=206: L=172 R=340 -->
  <polygon points="174,194 338,194 340,206 172,206" fill="#20223C"/>
  <line x1="186" y1="195" x2="326" y2="195" stroke="rgba(255,255,255,0.10)" stroke-width="1.5"/>

  <!-- Interior recess — extends to front face top at y=296 -->
  <!-- y=202: IL=185 IR=327   y=296: IL=171 IR=341 -->
  <polygon points="185,202 327,202 341,296 171,296" fill="#080910"/>
  <!-- Interior rear wall highlight -->
  <polygon points="185,202 327,202 327,205 185,205" fill="#20223A"/>

  <!-- Inner side wall edge highlights (slanted, following trapezoid inner walls) -->
  <line x1="185" y1="204" x2="171" y2="296" stroke="rgba(255,255,255,0.07)" stroke-width="2.5"/>
  <line x1="327" y1="204" x2="341" y2="296" stroke="rgba(0,0,0,0.22)" stroke-width="2.5"/>

  <!-- ============================================================ -->
  <!-- 3. CARTRIDGES  (back → front, box front face covers bottoms) -->
  <!--                                                              -->
  <!-- GBA-style details on cart 1:                                 -->
  <!--  • Top-right corner notch (anti-insertion key cut-out)       -->
  <!--  • Side panels with 3 horizontal grip grooves each           -->
  <!--  • Multi-line top ridge band                                  -->
  <!--  • White label with .ROM text                                 -->
  <!--                                                              -->
  <!-- All carts at local x=0–130.  Placed at:                     -->
  <!--   Cart 3 translate(191,166)  Cart 2 translate(191,181)       -->
  <!--   Cart 1 translate(191,196)                                  -->
  <!--                                                              -->
  <!-- Box front face covers from ~y=264 (sides) so the label      -->
  <!-- area (global y≈221–270) is fully visible.                    -->
  <!-- ============================================================ -->

  <!-- ── Cart 2 (back, full GBA markings, slightly darker) ── -->
  <!--
    Positioned at y=148 so 48px is visible above Cart 1 (top at y=196):
      Top face:  global y=148–162  (local y= 0–14)
      Visible front face strip: local y=14–62  (global y=162–210, clipped at 196 by Cart 1)
      First groove visible at local y=36 (global y=184) ✓
      Second groove at local y=46 (global y=194) ✓
  -->
  <g transform="translate(191,124)">
    <!-- Top face: only top-left rounded (top-right is the notch edge) -->
    <path d="M 4,0 Q 0,0 0,4 L 0,14 L 112,14 L 112,0 Z" fill="#AEAEBE"/>
    <!-- notch void is transparent — nothing drawn at x=112–130, y=0–14 -->

    <!-- Front face path (notch cut from top-right) -->
    <path d="M 0,14 L 112,14 L 112,28 L 130,28 L 130,92 L 0,92 Z" fill="#9C9CAC"/>

    <!-- notch interior is transparent — left-wall and floor edges only -->
    <line x1="112" y1="14" x2="112" y2="28" stroke="#888898" stroke-width="1.5"/>
    <line x1="112" y1="28" x2="130" y2="28" stroke="#808090" stroke-width="1"/>

    <!-- Left side panel -->
    <rect x="0" y="14" width="18" height="78" rx="3" fill="#8888A0"/>
    <!-- Left grip grooves -->
    <line x1="2" y1="36"   x2="16" y2="36"   stroke="rgba(0,0,0,0.30)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="2" y1="37.5" x2="16" y2="37.5" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
    <line x1="2" y1="42"   x2="16" y2="42"   stroke="rgba(0,0,0,0.26)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="2" y1="43.5" x2="16" y2="43.5" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <line x1="2" y1="48"   x2="16" y2="48"   stroke="rgba(0,0,0,0.18)" stroke-width="2"   stroke-linecap="round"/>
    <line x1="2" y1="49.5" x2="16" y2="49.5" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- Right side panel (starts below notch floor) -->
    <rect x="112" y="28" width="18" height="64" rx="3" fill="#8888A0"/>
    <!-- Right grip grooves -->
    <line x1="114" y1="36"   x2="128" y2="36"   stroke="rgba(0,0,0,0.30)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="114" y1="37.5" x2="128" y2="37.5" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
    <line x1="114" y1="42"   x2="128" y2="42"   stroke="rgba(0,0,0,0.26)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="114" y1="43.5" x2="128" y2="43.5" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <line x1="114" y1="48"   x2="128" y2="48"   stroke="rgba(0,0,0,0.18)" stroke-width="2"   stroke-linecap="round"/>
    <line x1="114" y1="49.5" x2="128" y2="49.5" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- Top ridge band (left of notch) -->
    <rect x="0" y="14" width="112" height="11" fill="#8A8A9C"/>
    <line x1="0" y1="17"   x2="112" y2="17"   stroke="rgba(255,255,255,0.16)" stroke-width="1.5"/>
    <line x1="0" y1="19.5" x2="112" y2="19.5" stroke="rgba(0,0,0,0.14)"       stroke-width="1"/>
    <line x1="0" y1="22"   x2="112" y2="22"   stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- Bottom ridge band -->
    <rect x="0" y="81" width="130" height="11" rx="2" fill="#8A8A9C"/>
    <line x1="0" y1="84"   x2="130" y2="84"   stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
    <line x1="0" y1="86.5" x2="130" y2="86.5" stroke="rgba(0,0,0,0.10)"       stroke-width="1"/>

  </g>

  <!-- ── Cart 1 (front, labelled .ROM, full GBA markings) ── -->
  <g transform="translate(191,172)">

    <!-- Top face: only top-left rounded (top-right is the notch edge) -->
    <path d="M 4,0 Q 0,0 0,4 L 0,14 L 112,14 L 112,0 Z" fill="#BEBECE"/>
    <!-- notch void is transparent — nothing drawn at x=112–130, y=0–14 -->

    <!-- Front face path (notch cut from top-right) -->
    <path d="M 0,14 L 112,14 L 112,28 L 130,28 L 130,92 L 0,92 Z" fill="#ACACBC"/>

    <!-- notch interior is transparent — left-wall and floor edges only -->
    <line x1="112" y1="14" x2="112" y2="28" stroke="#9A9AAC" stroke-width="1.5"/>
    <line x1="112" y1="28" x2="130" y2="28" stroke="#9090A0" stroke-width="1"/>

    <!-- Left side panel -->
    <rect x="0" y="14" width="18" height="78" rx="3" fill="#9898A8"/>
    <!-- Left grip grooves -->
    <line x1="2" y1="36"   x2="16" y2="36"   stroke="rgba(0,0,0,0.30)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="2" y1="37.5" x2="16" y2="37.5" stroke="rgba(255,255,255,0.16)" stroke-width="1"/>
    <line x1="2" y1="42"   x2="16" y2="42"   stroke="rgba(0,0,0,0.28)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="2" y1="43.5" x2="16" y2="43.5" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
    <line x1="2" y1="48"   x2="16" y2="48"   stroke="rgba(0,0,0,0.20)" stroke-width="2"   stroke-linecap="round"/>
    <line x1="2" y1="49.5" x2="16" y2="49.5" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>

    <!-- Right side panel (starts below notch floor) -->
    <rect x="112" y="28" width="18" height="64" rx="3" fill="#9898A8"/>
    <!-- Right grip grooves -->
    <line x1="114" y1="36"   x2="128" y2="36"   stroke="rgba(0,0,0,0.30)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="114" y1="37.5" x2="128" y2="37.5" stroke="rgba(255,255,255,0.16)" stroke-width="1"/>
    <line x1="114" y1="42"   x2="128" y2="42"   stroke="rgba(0,0,0,0.28)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="114" y1="43.5" x2="128" y2="43.5" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
    <line x1="114" y1="48"   x2="128" y2="48"   stroke="rgba(0,0,0,0.20)" stroke-width="2"   stroke-linecap="round"/>
    <line x1="114" y1="49.5" x2="128" y2="49.5" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>

    <!-- Top ridge band (left of notch) -->
    <rect x="0" y="14" width="112" height="11" fill="#9A9AAA"/>
    <line x1="0" y1="17"   x2="112" y2="17"   stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
    <line x1="0" y1="19.5" x2="112" y2="19.5" stroke="rgba(0,0,0,0.14)"       stroke-width="1"/>
    <line x1="0" y1="22"   x2="112" y2="22"   stroke="rgba(255,255,255,0.10)" stroke-width="1"/>

    <!-- Bottom ridge band -->
    <rect x="0" y="81" width="130" height="11" rx="2" fill="#9A9AAA"/>
    <line x1="0" y1="84"   x2="130" y2="84"   stroke="rgba(255,255,255,0.14)" stroke-width="1.5"/>
    <line x1="0" y1="86.5" x2="130" y2="86.5" stroke="rgba(0,0,0,0.12)"       stroke-width="1"/>

    <!-- White label -->
    <rect x="20" y="27" width="90" height="50" rx="4" fill="#F0F0F2"/>
    <rect x="20" y="27" width="90" height="50" rx="4" fill="none"
          stroke="rgba(0,0,0,0.12)" stroke-width="1.5"/>

    <!-- ROM pixel-art text — centred on label (x=20–110, y=27–77) -->
    <!-- Text 68px wide, 20px tall → starts at x=31, y=42           -->
    <!-- R: sx=31 sy=42 -->
    <rect x="31" y="42" width="16" height="4" fill="#18182A"/>
    <rect x="31" y="46" width="4"  height="4" fill="#18182A"/>
    <rect x="47" y="46" width="4"  height="4" fill="#18182A"/>
    <rect x="31" y="50" width="16" height="4" fill="#18182A"/>
    <rect x="31" y="54" width="4"  height="4" fill="#18182A"/>
    <rect x="39" y="54" width="4"  height="4" fill="#18182A"/>
    <rect x="31" y="58" width="4"  height="4" fill="#18182A"/>
    <rect x="43" y="58" width="4"  height="4" fill="#18182A"/>
    <!-- O: sx=55 sy=42 -->
    <rect x="59" y="42" width="12" height="4" fill="#18182A"/>
    <rect x="55" y="46" width="4"  height="4" fill="#18182A"/>
    <rect x="71" y="46" width="4"  height="4" fill="#18182A"/>
    <rect x="55" y="50" width="4"  height="4" fill="#18182A"/>
    <rect x="71" y="50" width="4"  height="4" fill="#18182A"/>
    <rect x="55" y="54" width="4"  height="4" fill="#18182A"/>
    <rect x="71" y="54" width="4"  height="4" fill="#18182A"/>
    <rect x="59" y="58" width="12" height="4" fill="#18182A"/>
    <!-- M: sx=79 sy=42 -->
    <rect x="79" y="42" width="4"  height="4" fill="#18182A"/>
    <rect x="95" y="42" width="4"  height="4" fill="#18182A"/>
    <rect x="79" y="46" width="8"  height="4" fill="#18182A"/>
    <rect x="91" y="46" width="8"  height="4" fill="#18182A"/>
    <rect x="79" y="50" width="4"  height="4" fill="#18182A"/>
    <rect x="87" y="50" width="4"  height="4" fill="#18182A"/>
    <rect x="95" y="50" width="4"  height="4" fill="#18182A"/>
    <rect x="79" y="54" width="4"  height="4" fill="#18182A"/>
    <rect x="95" y="54" width="4"  height="4" fill="#18182A"/>
    <rect x="79" y="58" width="4"  height="4" fill="#18182A"/>
    <rect x="95" y="58" width="4"  height="4" fill="#18182A"/>

    <!-- Label decorative lines -->
    <line x1="24" y1="65" x2="106" y2="65" stroke="rgba(0,0,0,0.10)" stroke-width="1.5"/>
    <line x1="24" y1="70" x2="106" y2="70" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
  </g>

  <!-- ============================================================ -->
  <!-- 4. BOX FRONT FACE  (covers cart bottoms, drawn over carts)  -->
  <!-- Front face starts at y=296 (shifted up 24px, less taper).   -->
  <!-- y=296: L=159 R=353    y=388: L=146 R=366                   -->
  <!-- ============================================================ -->
  <polygon points="146,388 366,388 353,296 159,296" fill="url(#box-face)"/>

  <!-- Front face panel detail -->
  <line x1="164" y1="344" x2="348" y2="344" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>

  <!-- Front rim top face (full width, lit from above) -->
  <!-- y=283: L=161 R=351    y=290: L=160 R=352 -->
  <polygon points="161,283 351,283 352,290 160,290" fill="#1E2038"/>
  <line x1="161" y1="283" x2="351" y2="283" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
  <!-- Indent groove / lip -->
  <!-- y=290: L=160 R=352    y=296: L=159 R=353 -->
  <polygon points="160,290 352,290 353,296 159,296" fill="#07080D"/>
  <line x1="160" y1="290" x2="352" y2="290" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

  <!-- Box bottom edge -->
  <polygon points="148,376 364,376 366,388 146,388" fill="#101120"/>

  <!-- Rainbow badge on box front face — centred in y=296–388 -->
  <rect x="224" y="310" width="64" height="64" rx="14" fill="url(#grad-box-badge)" opacity="0.88"/>
  <rect x="232" y="318" width="48" height="48" rx="7" fill="url(#box-face)"/>

  <!-- ============================================================ -->
  <!-- 4. RAINBOW RING  (drawn after box so ring sits over box)     -->
  <!-- ============================================================ -->
  <g fill="none" stroke-width="26" stroke-linecap="butt">
    <path d="M 129 129 A 180 180 0 0 1 383 129" stroke="url(#grad-top)"/>
    <path d="M 383 129 A 180 180 0 0 1 383 383" stroke="url(#grad-right)"/>
    <path d="M 383 383 A 180 180 0 0 1 129 383" stroke="url(#grad-bottom)"/>
    <path d="M 129 383 A 180 180 0 0 1 129 129" stroke="url(#grad-left)"/>
  </g>

  <!-- ============================================================ -->
  <!-- 5. CORNER BADGES  (drawn LAST — always on top of the box)   -->
  <!-- ============================================================ -->

  <!-- TL: Blue — Magnifying glass -->
  <circle cx="112" cy="112" r="58" fill="#007AFF" filter="url(#f-badge)"/>
  <circle cx="107" cy="107" r="21" fill="none" stroke="white" stroke-width="9"/>
  <line x1="122" y1="122" x2="140" y2="140" stroke="white" stroke-width="9" stroke-linecap="round"/>

  <!-- TR: Green — Checkmark -->
  <circle cx="400" cy="112" r="58" fill="#34C759" filter="url(#f-badge)"/>
  <polyline points="374,112 394,131 430,88" fill="none" stroke="white" stroke-width="9"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- BL: Orange — Zip file -->
  <circle cx="112" cy="400" r="58" fill="#FF9500" filter="url(#f-badge)"/>
  <path d="M 90 377 L 90 431 L 134 431 L 134 397 L 116 377 Z" fill="white"/>
  <polygon points="116,377 134,397 116,397" fill="#FFB030"/>
  <polyline points="116,377 116,397 134,397" fill="none" stroke="white" stroke-width="2"/>
  <rect x="108" y="389" width="8" height="8" rx="2" fill="white" stroke="#FF9500" stroke-width="1.5"/>
  <line x1="112" y1="397" x2="112" y2="426" stroke="#FF9500" stroke-width="3"   stroke-linecap="round"/>
  <line x1="101" y1="404" x2="112" y2="404" stroke="#FF9500" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="123" y1="411" x2="112" y2="411" stroke="#FF9500" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="101" y1="418" x2="112" y2="418" stroke="#FF9500" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="123" y1="425" x2="112" y2="425" stroke="#FF9500" stroke-width="2.5" stroke-linecap="round"/>

  <!-- BR: Purple — Pencil (abstract white) -->
  <circle cx="400" cy="400" r="58" fill="#AF52DE" filter="url(#f-badge)"/>
  <g transform="translate(400,400) rotate(45)">
    <rect x="-6" y="-26" width="12" height="36" rx="2" fill="white"/>
    <polygon points="-6,10 6,10 0,24" fill="white"/>
  </g>

</svg>
