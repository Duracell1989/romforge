sonar.projectKey=Duracell1989_RomForge
sonar.organization=duracell1989

sonar.sourceEncoding=UTF-8

sonar.exclusions=artifacts/**,**/bin/**,**/obj/**,**/*.g.cs

# Avalonia glue files: no branching logic, untestable without the UI host
sonar.coverage.exclusions=\
  **/App.axaml.cs,\
  **/Program.cs,\
  **/ViewLocator.cs,\
  **/AvaloniaUserNotifier.cs,\
  **/AvaloniaFileDialogService.cs,\
  **/AvaloniaUiDispatcher.cs,\
  **/AvaloniaAppLifetime.cs,\
  **/Views/*.axaml.cs

sonar.cs.cobertura.reportsPaths=artifacts/coverage/**/coverage.cobertura.xml
